<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>墨境 · 任务派发面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1f2329; min-height: 100vh; padding: 24px; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: #8e929b; font-size: 13px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid rgba(0,0,0,0.06); transition: all 0.2s; cursor: pointer; position: relative; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
.card-icon { font-size: 28px; margin-bottom: 8px; }
.card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
.status-waiting { background: #e8f2ff; color: #0071e3; }
.status-done { background: #e8f8f2; color: #27c997; }
.card-task { font-size: 13px; color: #646a73; line-height: 1.6; max-height: 80px; overflow: hidden; }
.card-task.full { max-height: none; }
.card-btn { display: block; width: 100%; margin-top: 12px; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-send { background: #0071e3; color: #fff; }
.btn-send:hover { background: #0066cc; }
.btn-copy { background: #f0f2f5; color: #1f2329; }
.btn-copy:hover { background: #e5e7eb; }
.btn-view { background: transparent; color: #0071e3; border: 1px solid #0071e3; }
.btn-view:hover { background: #e8f2ff; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2329; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 100; }
.modal-overlay.show { display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 18px; margin-bottom: 12px; }
.modal pre { background: #f7f8fa; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; font-family: 'Consolas', 'Menlo', monospace; }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.badge { background: #ff3b30; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.help { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid rgba(0,0,0,0.06); }
.help h3 { font-size: 15px; margin-bottom: 8px; }
.help ol { padding-left: 20px; font-size: 13px; color: #646a73; line-height: 2; }
.help code { background: #f0f2f5; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<h1>📋 墨境 · 任务派发面板</h1>
<p class="subtitle">点击角色卡片查看任务或复制指令</p>

<div class="header-row">
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="card-btn btn-send" style="width:auto;padding:8px 16px;" onclick="refreshAll()">🔄 刷新任务</button>
    <button class="card-btn btn-copy" style="width:auto;padding:8px 16px;" onclick="copyAllQuick()">📋 复制全部"查收任务"</button>
  </div>
  <span id="taskCount" class="badge">0 个待办</span>
</div>

<div class="grid" id="roleGrid"></div>

<div class="help">
  <h3>💡 使用流程</h3>
  <ol>
    <li>总管在下方任务文件夹中为角色写好任务</li>
    <li>点击角色卡片的<strong>"复制指令"</strong>按钮</li>
    <li>打开 Reasonix 中对应角色的对话框</li>
    <li>粘贴发送 — 角色会自动读取任务文件并执行</li>
    <li>简短指令 <code>查收任务</code> 也可以（角色设定里已配置自动读取）</li>
  </ol>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle"></h2>
    <pre id="modalContent"></pre>
    <div class="modal-btns">
      <button class="card-btn btn-send" style="flex:1;" onclick="copyModalContent()">📋 复制任务内容</button>
      <button class="card-btn btn-copy" style="flex:1;" onclick="copyQuickCmd()">💬 复制"查收任务"</button>
      <button class="card-btn btn-view" style="flex:0.5;" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TASKS_DIR = 'file:///D:/建网站/mojing-docs/tasks/';
const ROLES = [
  { file: '后端技术负责人.md', icon: '⚙️', name: '后端技术负责人', session: 'session-2' },
  { file: '前端技术负责人.md', icon: '🎨', name: '前端技术负责人', session: 'session-5' },
  { file: '架构审查员.md', icon: '🔍', name: '架构审查员', session: 'session-8' },
  { file: '提示词系统专家.md', icon: '🧠', name: '提示词系统专家', session: 'session-1' },
  { file: '产品经理.md', icon: '📊', name: '产品经理', session: 'session-6' },
  { file: 'UIUX设计师.md', icon: '🎯', name: 'UI/UX 设计师', session: 'session-4' },
  { file: 'QA测试工程师.md', icon: '🧪', name: 'QA 测试工程师', session: 'session-5' },
];

let taskData = {};
let currentRole = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function renderCards() {
  const grid = document.getElementById('roleGrid');
  grid.innerHTML = '';
  let pendingCount = 0;

  ROLES.forEach(role => {
    const content = taskData[role.file] || '';
    const hasTask = content && content !== '暂无任务' && content.trim() !== '';
    const status = hasTask ? 'waiting' : 'done';
    if (hasTask) pendingCount++;

    const taskPreview = hasTask ? content.substring(0, 120) + (content.length > 120 ? '...' : '') : '暂无任务';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-icon">${role.icon}</div>
      <div class="card-name">${role.name}</div>
      <span class="card-status status-${status}">${hasTask ? '⏳ 待执行' : '✅ 无任务'}</span>
      <div class="card-task">${taskPreview}</div>
      ${hasTask ? `
        <button class="card-btn btn-send" onclick="event.stopPropagation();copyTask('${role.file}')">📋 复制指令</button>
        <button class="card-btn btn-copy" style="margin-top:6px;" onclick="event.stopPropagation();copyQuickFor('${role.file}')">💬 复制"查收任务"</button>
      ` : `
        <button class="card-btn btn-view" onclick="event.stopPropagation();viewTask('${role.file}')">查看</button>
      `}
    `;
    card.onclick = () => viewTask(role.file);
    grid.appendChild(card);
  });

  document.getElementById('taskCount').textContent = pendingCount + ' 个待办';
}

async function loadTask(filename) {
  try {
    const resp = await fetch(TASKS_DIR + filename);
    if (resp.ok) {
      taskData[filename] = await resp.text();
    } else {
      taskData[filename] = '';
    }
  } catch {
    taskData[filename] = '';
  }
}

async function refreshAll() {
  for (const role of ROLES) {
    await loadTask(role.file);
  }
  renderCards();
  showToast('已刷新');
}

function viewTask(filename) {
  currentRole = filename;
  const role = ROLES.find(r => r.file === filename);
  const content = taskData[filename] || '暂无任务';
  document.getElementById('modalTitle').textContent = role.icon + ' ' + role.name;
  document.getElementById('modalContent').textContent = content;
  document.getElementById('modalOverlay').classList.add('show');
}

function copyTask(filename) {
  const content = taskData[filename];
  if (!content) { showToast('没有任务内容'); return; }
  navigator.clipboard.writeText(content).then(() => showToast('✅ 任务已复制'));
}

function copyQuickCmd() {
  navigator.clipboard.writeText('查收任务').then(() => showToast('✅ 已复制"查收任务"'));
}

function copyQuickFor(filename) {
  navigator.clipboard.writeText('查收任务').then(() => showToast('✅ 已复制，去粘贴给对应角色'));
}

function copyAllQuick() {
  navigator.clipboard.writeText('查收任务').then(() => showToast('✅ 已复制"查收任务"，逐个粘贴给角色'));
}

// 初始化
refreshAll();
</script>
</body>
</html>
